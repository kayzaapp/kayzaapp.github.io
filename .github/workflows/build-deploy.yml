name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump_version:
        description: 'Bump minor version before build/deploy'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  bump_version:
    if: github.actor != 'github-actions[bot]' && github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Setup npm
        run: npm install -g npm@11.12.1

      - name: Decide whether to auto bump
        id: bump_gate
        run: |
          set -euo pipefail
          should_bump=false

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ github.event.inputs.bump_version }}" == "true" ]]; then
              should_bump=true
            fi
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            if git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" | grep -Eq '^(package.json|package-lock.json)$'; then
              should_bump=false
            else
              should_bump=true
            fi
          fi

          echo "should_bump=$should_bump" >> "$GITHUB_OUTPUT"

      - name: Bump minor version
        if: steps.bump_gate.outputs.should_bump == 'true'
        run: npm version minor --no-git-tag-version

      - name: Commit and push version bump
        if: steps.bump_gate.outputs.should_bump == 'true'
        run: |
          if git diff --quiet -- package.json package-lock.json; then
            echo "No version changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: bump minor version"
          git push

  build:
    if: github.actor != 'github-actions[bot]' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: bump_version
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Setup npm
        run: npm install -g npm@11.12.1

      - name: Install dependencies
        run: npm ci

      - name: Build Angular app
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: 'dist/kayzaapp/browser'

  deploy:
    if: github.actor != 'github-actions[bot]' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
