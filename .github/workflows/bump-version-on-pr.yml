name: Bump Version On PR Open

on:
  pull_request:
    types: [opened, reopened]
    branches: [main]

permissions:
  contents: write
  pull-requests: read

jobs:
  bump_version:
    if: github.actor != 'github-actions[bot]' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Setup npm
        run: npm install -g npm@11.12.1

      - name: Skip if version files already changed in PR
        id: version_files
        run: |
          git fetch origin "${{ github.event.pull_request.base.ref }}"

          if git diff --name-only "origin/${{ github.event.pull_request.base.ref }}...HEAD" | grep -Eq '^(package.json|package-lock.json)$'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump minor version
        if: steps.version_files.outputs.changed == 'false'
        run: npm version minor --no-git-tag-version

      - name: Commit and push version bump
        if: steps.version_files.outputs.changed == 'false'
        run: |
          if git diff --quiet -- package.json package-lock.json; then
            echo "No version changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: bump minor version"
          git push origin HEAD:"${{ github.event.pull_request.head.ref }}"